<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Reports</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui, Arial, sans-serif;
        }

        .tabs {
            display: flex;
            gap: 8px;
            padding: 10px;
            border-bottom: 1px solid #ddd;
            background: #fafafa;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        button.tab {
            border: 1px solid #ddd;
            background: white;
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
        }

            button.tab.active {
                border-color: #333;
                font-weight: 700;
            }

        .frame-wrap {
            height: calc(100vh - 54px);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: none;
        }

            iframe.active {
                display: block;
            }

        .note {
            padding: 8px 10px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="tabs">
        <button class="tab active" data-target="week5">Week 5 Deliverable</button>
        <button class="tab" data-target="test3">Test 3 Report</button>
        <button class="tab active" data-target="week7">Week 7 Deliverable</button>
    </div>

   

    <div class="frame-wrap">
        <iframe id="week5" class="active" src="Week5_Deliverable.html" title="Week 5 Deliverable"></iframe>
        <iframe id="test3" src="test3_report.html" title="Test 3 Report"></iframe>
        <iframe id="week7" class="active" src="Week7_Deliverable.html" title="Week 7 Deliverable"></iframe>
    </div>

    <script>
    const tabs = document.querySelectorAll('button.tab');
    const frames = document.querySelectorAll('iframe');

    tabs.forEach(btn => {
      btn.addEventListener('click', () => {
        tabs.forEach(b => b.classList.remove('active'));
        frames.forEach(f => f.classList.remove('active'));

        btn.classList.add('active');
        document.getElementById(btn.dataset.target).classList.add('active');
      });
    });
    </script>
</body>
</html>
